<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Nationalities — Fantasy League HQ</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ---- Page-specific overrides ---- */
  .section-header {
    position: relative;
    overflow: hidden;
  }

  .section-header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(196,113,59,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ---- Stat counter animation ---- */
  .stat-item .num {
    display: inline-block;
    transition: transform 0.3s ease;
  }
  .stat-item:hover .num {
    transform: scale(1.08);
    color: var(--accent-warm);
  }

  /* ---- Chart cards ---- */
  .team-name {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 20px;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color var(--transition-fast);
  }

  .card:hover .team-name { color: var(--accent-warm); }

  .team-count {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .chart-container {
    position: relative;
    width: 100%;
    max-width: 220px;
    margin: 0 auto 20px;
    aspect-ratio: 1;
    transition: transform var(--transition);
  }

  .card:hover .chart-container { transform: scale(1.03); }

  /* ---- Legend ---- */
  .legend-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    justify-content: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--text-secondary);
    transition: color var(--transition-fast);
  }

  .legend-item:hover { color: var(--text-primary); }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 3px;
    flex-shrink: 0;
    transition: transform var(--transition-fast);
  }

  .legend-item:hover .legend-dot { transform: scale(1.3); }

  .legend-count {
    color: var(--text-muted);
    font-size: 11px;
  }

  .card canvas { cursor: pointer; }

  /* ---- Modal detail styles ---- */
  .modal-country {
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(10px);
    animation: modalItemIn 0.4s ease forwards;
  }

  .modal-country:nth-child(1) { animation-delay: 0.05s; }
  .modal-country:nth-child(2) { animation-delay: 0.1s; }
  .modal-country:nth-child(3) { animation-delay: 0.15s; }
  .modal-country:nth-child(4) { animation-delay: 0.2s; }
  .modal-country:nth-child(5) { animation-delay: 0.25s; }
  .modal-country:nth-child(6) { animation-delay: 0.3s; }
  .modal-country:nth-child(7) { animation-delay: 0.35s; }
  .modal-country:nth-child(8) { animation-delay: 0.4s; }

  @keyframes modalItemIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-country-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-light);
  }

  .modal-country-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  .modal-country-name {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-primary);
  }

  .modal-country-count {
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .modal-player {
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text-secondary);
    padding: 5px 0 5px 20px;
    position: relative;
    transition: color var(--transition-fast);
  }

  .modal-player:hover { color: var(--text-primary); }

  .modal-player::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--border-dark);
  }

  .modal-player .pos {
    color: var(--text-muted);
    font-size: 12px;
    margin-left: 4px;
  }

  /* ---- League-wide bar at bottom ---- */
  .league-bar-section {
    padding: 0 0 80px;
  }

  .league-bar-title {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 400;
    text-align: center;
    margin-bottom: 32px;
    color: var(--text-primary);
    opacity: 0;
    transform: translateY(20px);
    transition: all var(--transition-slow);
  }

  .league-bar-title.visible { opacity: 1; transform: translateY(0); }
  .league-bar-title em { font-style: italic; color: var(--accent-warm); }

  .league-bars {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transform: translateY(20px);
    transition: all var(--transition-slow);
  }

  .league-bars.visible { opacity: 1; transform: translateY(0); transition-delay: 0.15s; }

  .bar-row {
    display: grid;
    grid-template-columns: 160px 1fr 40px;
    align-items: center;
    gap: 16px;
  }

  .bar-label {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    text-align: right;
  }

  .bar-track {
    height: 28px;
    background: var(--bg-secondary);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 6px;
    width: 0;
    transition: width 1.2s cubic-bezier(0.25,0.46,0.45,0.94);
    position: relative;
  }

  .bar-fill.animate { /* width set via JS */ }

  .bar-value {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
  }

  @media (max-width: 768px) {
    .bar-row { grid-template-columns: 100px 1fr 36px; gap: 10px; }
    .bar-label { font-size: 11px; }
  }
</style>
</head>

  <div class="container league-bar-section">

</main>

    <div id="modalBody"></div>
  </div>
</div>

<footer class="site-footer">

</footer>

// ============================================================
// WARM EARTH-TONE COLORS
// ============================================================
const COLORS={
  "USA":"#8b7355","Dominican Republic":"#c4713b","Venezuela":"#d4a843",
  "Cuba":"#2a7a6d","Puerto Rico":"#b84233","Japan":"#9c4d4d","Mexico":"#6a994e",
  "Colombia":"#c98f2e","Panama":"#3d6b5e","Canada":"#a63d2f","Curacao":"#4a7fa5",
  "South Korea":"#7b5ea7","Aruba":"#c96b8b","Nicaragua":"#5a9cb5","Brazil":"#4a8c3f",
  "Bahamas":"#3a8fa0","Australia":"#c4873b","Netherlands":"#d47b34","Taiwan":"#8b3a3a"
};
const getColor=c=>COLORS[c]||'#8a7f73';

// ============================================================
// BUILD CARDS
// ============================================================
const grid=document.getElementById('grid');
let totalPlayers=0;
const allCountries={};
TEAMS.forEach(t=>t.players.forEach(p=>{totalPlayers++;allCountries[p.c]=(allCountries[p.c]||0)+1;}));

document.getElementById('leagueStats').innerHTML=`
  <div class="stat-item"><div class="num">${TEAMS.length}</div><div class="label">Teams</div></div>
  <div class="stat-item"><div class="num">${totalPlayers}</div><div class="label">Players</div></div>
  <div class="stat-item"><div class="num">${Object.keys(allCountries).length}</div><div class="label">Countries</div></div>`;

TEAMS.forEach((team,idx)=>{
  const cm={};
  team.players.forEach(p=>cm[p.c]=(cm[p.c]||0)+1);
  const sorted=Object.entries(cm).sort((a,b)=>b[1]-a[1]);

  const card=document.createElement('div');
  card.className='card';
  card.style.transitionDelay=(idx*0.06)+'s';
  card.innerHTML=`
    <div class="team-name">${team.name}</div>
    <div class="team-count">${team.players.length} players</div>
    <div class="chart-container"><canvas id="chart-${idx}"></canvas></div>
    <div class="legend-container" id="legend-${idx}"></div>`;
  grid.appendChild(card);

  const legendEl=card.querySelector(`#legend-${idx}`);
  sorted.forEach(([country,count])=>{
    const item=document.createElement('div');
    item.className='legend-item';
    item.innerHTML=`<div class="legend-dot" style="background:${getColor(country)}"></div>${country} <span class="legend-count">(${count})</span>`;
    legendEl.appendChild(item);
  });

  const ctx=document.getElementById(`chart-${idx}`).getContext('2d');
  new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:sorted.map(s=>s[0]),
      datasets:[{
        data:sorted.map(s=>s[1]),
        backgroundColor:sorted.map(s=>getColor(s[0])),
        borderColor:'#ffffff',
        borderWidth:3,
        hoverBorderColor:'#1a1714',
        hoverBorderWidth:2,
        hoverOffset:8,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:true,
      cutout:'45%',
      animation:{animateRotate:true,duration:1000,delay:idx*100,easing:'easeOutQuart'},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1a1714',
          titleColor:'#faf6f1',
          bodyColor:'#b5aa9e',
          borderColor:'#3d352c',
          borderWidth:1,
          cornerRadius:8,
          padding:12,
          titleFont:{family:'EB Garamond',size:15,weight:500},
          bodyFont:{family:'DM Sans',size:13},
          callbacks:{
            label:ctx=>{
              const count=ctx.raw;
              const pct=((count/team.players.length)*100).toFixed(0);
              return ` ${count} player${count>1?'s':''} (${pct}%)`;
            }
          }
        }
      },
      onClick:()=>showModal(team)
    }
  });

  card.addEventListener('click',e=>{if(e.target.tagName!=='CANVAS')showModal(team);});
});

// ============================================================
// SCROLL-TRIGGERED REVEALS
// ============================================================
const observer=new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
},{threshold:0.08,rootMargin:'0px 0px -40px 0px'});

document.querySelectorAll('.card').forEach(card=>observer.observe(card));

// Also observe the bar section
const barObserver=new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
      barObserver.unobserve(entry.target);
      // Trigger bar animations
      setTimeout(()=>{
        document.querySelectorAll('.bar-fill').forEach(bar=>{
          bar.style.width=bar.dataset.width;
        });
      },200);
    }
  });
},{threshold:0.2});

document.querySelectorAll('#barTitle, #leagueBars').forEach(el=>barObserver.observe(el));

// ============================================================
// LEAGUE-WIDE HORIZONTAL BARS
// ============================================================
const barsEl=document.getElementById('leagueBars');
const sortedAll=Object.entries(allCountries).sort((a,b)=>b[1]-a[1]);
const maxCount=sortedAll[0][1];

sortedAll.forEach(([country,count])=>{
  const pct=(count/maxCount)*100;
  const row=document.createElement('div');
  row.className='bar-row';
  row.innerHTML=`
    <div class="bar-label">${country}</div>
    <div class="bar-track">
      <div class="bar-fill" style="background:${getColor(country)};width:0" data-width="${pct}%"></div>
    </div>
    <div class="bar-value">${count}</div>`;
  barsEl.appendChild(row);
});

// ============================================================
// MODAL
// ============================================================
const overlay=document.getElementById('modalOverlay');
const modalTitle=document.getElementById('modalTitle');
const modalBody=document.getElementById('modalBody');

function showModal(team){
  modalTitle.textContent=team.name;
  const byCountry={};
  team.players.forEach(p=>{if(!byCountry[p.c])byCountry[p.c]=[];byCountry[p.c].push(p);});
  const sorted=Object.entries(byCountry).sort((a,b)=>b[1].length-a[1].length);
  modalBody.innerHTML=sorted.map(([country,players])=>`
    <div class="modal-country">
      <div class="modal-country-header">
        <div class="modal-country-dot" style="background:${getColor(country)}"></div>
        <span class="modal-country-name">${country}</span>
        <span class="modal-country-count">${players.length} player${players.length>1?'s':''}</span>
      </div>
      ${players.map(p=>`<div class="modal-player">${p.n} <span class="pos">${p.pos}</span></div>`).join('')}
    </div>`).join('');
  overlay.classList.add('active');
  document.body.style.overflow='hidden';
}

document.getElementById('modalClose').addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function closeModal(){
  overlay.classList.remove('active');
  document.body.style.overflow='';
}
</script>
</body>
</html>
